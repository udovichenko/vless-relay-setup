# Split Routing: RU Direct
# Российские сервисы напрямую, всё остальное через VPN
# Russian services go direct, everything else through VPN

[General]
bypass-system = true
ipv6 = false
private-ip-answer = true
dns-direct-system = false
dns-direct-fallback-proxy = true
dns-server = https://dns.adguard-dns.com/dns-query, https://1.1.1.1/dns-query
fallback-dns-server = 77.88.8.8, system
update-url = {update_url}

[Rule]
# Russian TLDs
DOMAIN-SUFFIX,ru,DIRECT
DOMAIN-SUFFIX,su,DIRECT
DOMAIN-SUFFIX,xn--p1ai,DIRECT
DOMAIN-SUFFIX,moscow,DIRECT
DOMAIN-SUFFIX,tatar,DIRECT

# Yandex
DOMAIN-SUFFIX,yandex.com,DIRECT
DOMAIN-SUFFIX,yandex.net,DIRECT
DOMAIN-SUFFIX,ya.ru,DIRECT

# VK / Mail.ru
DOMAIN-SUFFIX,vk.com,DIRECT
DOMAIN-SUFFIX,ok.ru,DIRECT
DOMAIN-SUFFIX,mail.ru,DIRECT

# Banks
DOMAIN-SUFFIX,sberbank.ru,DIRECT
DOMAIN-SUFFIX,sber.ru,DIRECT
DOMAIN-SUFFIX,tinkoff.ru,DIRECT
DOMAIN-SUFFIX,tbank.ru,DIRECT

# Marketplaces
DOMAIN-SUFFIX,wildberries.ru,DIRECT
DOMAIN-SUFFIX,wb.ru,DIRECT
DOMAIN-SUFFIX,ozon.ru,DIRECT
DOMAIN-SUFFIX,avito.ru,DIRECT

# Government
DOMAIN-SUFFIX,gosuslugi.ru,DIRECT

# All Russian IPs
GEOIP,RU,DIRECT

# Everything else through VPN
FINAL,PROXY
